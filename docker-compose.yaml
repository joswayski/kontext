networks:
  production-network:
    driver: bridge
  analytics-network:
    driver: bridge
  web-api-network:
    driver: bridge

volumes:
  kafka-prod-data:
    driver: local
  kafka-analytics-data:
    driver: local

services:
  # ===================================================================
  # CLUSTER 1: "PRODUCTION"
  # ===================================================================
  kafka-production-0:
    image: docker.redpanda.com/redpandadata/redpanda:${REDPANDA_VERSION}
    container_name: ${KAFKA_PRODUCTION_CONTAINER_NAME}
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:${KAFKA_PRODUCTION_PORT}
      - --advertise-kafka-addr internal://kafka-production-0:9092,external://localhost:${KAFKA_PRODUCTION_PORT}
      - --rpc-addr kafka-production-0:33145
      - --advertise-rpc-addr kafka-production-0:33145
      - --mode dev-container
      - --smp 1
    ports:
      - "${KAFKA_PRODUCTION_PORT}:${KAFKA_PRODUCTION_PORT}"
    volumes:
      - ${KAFKA_PRODUCTION_VOLUME}:/var/lib/kafka/data
    networks:
      - production-network

  # ===================================================================
  # CLUSTER 2: "ANALYTICS"
  # ===================================================================
  kafka-analytics-0:
    image: docker.redpanda.com/redpandadata/redpanda:${REDPANDA_VERSION}
    container_name: ${KAFKA_ANALYTICS_CONTAINER_NAME}
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:${KAFKA_ANALYTICS_PORT}
      - --advertise-kafka-addr internal://kafka-analytics-0:9092,external://localhost:${KAFKA_ANALYTICS_PORT}
      - --rpc-addr kafka-analytics-0:33145
      - --advertise-rpc-addr kafka-analytics-0:33145
      - --mode dev-container
      - --smp 1
    ports:
      - "${KAFKA_ANALYTICS_PORT}:${KAFKA_ANALYTICS_PORT}"
    volumes:
      - ${KAFKA_ANALYTICS_VOLUME}:/var/lib/kafka/data
    networks:
      - analytics-network

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: ${API_CONTAINER_NAME}
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - KAFKA_PRODUCTION_CLUSTER=${KAFKA_PRODUCTION_CLUSTER}
      - KAFKA_ANALYTICS_CLUSTER=${KAFKA_ANALYTICS_CLUSTER}
      - PORT=${PORT}
      - SHUTDOWN_TIMEOUT=${SHUTDOWN_TIMEOUT}
      - DATABASE_URL=${DATABASE_URL}
      - FRONTEND_URLS=${FRONTEND_URLS}
    depends_on:
      - kafka-production-0
      - kafka-analytics-0
    volumes:
      - ./services/api:/app
    networks:
      - production-network
      - analytics-network
      - web-api-network

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    container_name: ${WEB_CONTAINER_NAME}
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    environment:
      - API_URL=${API_URL}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      - api
    networks:
      - web-api-network
