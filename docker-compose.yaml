networks:
  prod-network:
    driver: bridge
  analytics-network:
    driver: bridge
  web-api-network:
    driver: bridge

volumes:
  kafka-prod-data:
    driver: local
  kafka-analytics-data:
    driver: local

services:
  # ===================================================================
  # CLUSTER 1: "PRODUCTION"
  # ===================================================================
  kafka-production-0:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.5
    container_name: kontext-kafka-production
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://kafka-production-0:9092,external://localhost:19092
      - --rpc-addr kafka-production-0:33145
      - --advertise-rpc-addr kafka-production-0:33145
      - --mode dev-container
      - --smp 1
    ports:
      - "19092:19092"
    volumes:
      - kafka-production-data:/var/lib/kafka/data
    networks:
      - production-network

  # ===================================================================
  # CLUSTER 2: "ANALYTICS"
  # ===================================================================
  kafka-analytics-0:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.5
    container_name: kontext-kafka-analytics
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:29092  # Note the different external port
      - --advertise-kafka-addr internal://kafka-analytics-0:9092,external://localhost:29092 # Note the different external port
      - --rpc-addr kafka-analytics-0:33145
      - --advertise-rpc-addr kafka-analytics-0:33145
      - --mode dev-container
      - --smp 1
    ports:
      - "29092:29092"
    volumes:
      - kafka-analytics-data:/var/lib/kafka/data
    networks:
      - analytics-network


  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: kontext-api
    ports:
      - "4000:4000"
    environment:
      - KAFKA_CLUSTER_PRODUCTION=kafka-production-0:9092
      - KAFKA_CLUSTER_ANALYTICS=kafka-analytics-0:9092
    depends_on:
      - kafka-production-0
      - kafka-analytics-0
    volumes:
      - ./services/api:/app
    networks:
      - production-network
      - analytics-network
      - web-api-network

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    container_name: kontext-web
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:4000
      - NODE_ENV=production
    depends_on:
      - api
    networks:
      - web-api-network
